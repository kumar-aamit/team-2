version: '3.8'

services:
  downtime-log:
    build: .
    container_id: machine-downtime-log
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8742}:8742"
    volumes:
      - ./data:/data
    environment:
      - APP_PORT=${APP_PORT:-8742}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://198.18.5.11:8000/v1}
      - LLM_MODEL=${LLM_MODEL:-/ai/models/NVIDIA/Nemotron-3-120B/}
      - LLM_API_KEY=${LLM_API_KEY:-LLM}
      - LLM_TIMEOUT_SECONDS=${LLM_TIMEOUT_SECONDS:-15}
      - DB_PATH=${DB_PATH:-/data/downtime.db}
      - SIMULATOR_ENABLED=${SIMULATOR_ENABLED:-true}
      - SIMULATOR_INTERVAL_SECONDS=${SIMULATOR_INTERVAL_SECONDS:-8}
      - GITHUB_REPO=${GITHUB_REPO:-https://github.com/pl247/team-2}
      - GHCR_IMAGE=${GHCR_IMAGE:-ghcr.io/pl247/team-2}